<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoquiz - Interactive Geography Game</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Geoquiz</h1>
            <p class="subtitle">Test your geography knowledge!</p>
        </header>

        <!-- Always-visible mode icon bar -->
        <div class="mode-icon-bar" id="mode-icon-bar" style="display: none;">
            <button class="mode-icon-btn" data-mode="countries" title="Countries of the World">🌍</button>
            <button class="mode-icon-btn" data-mode="us-states" title="US States">🗽</button>
            <button class="mode-icon-btn" data-mode="indian-states" title="Indian States">🇮🇳</button>
            <button class="mode-icon-btn" data-mode="german-states" title="German States">🇩🇪</button>
            <button class="mode-icon-btn" data-mode="identify" title="Identify Mode">🔍</button>
            <button class="mode-icon-btn" data-mode="name-all" title="Name All Countries">⌨️</button>
            <button class="mode-icon-btn" data-mode="population-order" title="Order by Population">📊</button>
            <button class="mode-icon-btn" data-mode="mystery-flag" title="Mystery Flag">🚩</button>
            <button class="mode-icon-btn" data-mode="capitals-race" title="Capitals Race">🏛️</button>
        </div>

        <!-- Mode Selector -->
        <div class="mode-selector" id="mode-selector">
            <h2>Select Quiz Mode</h2>
            <div class="mode-buttons" id="mode-buttons">
                <button class="mode-btn" data-mode="countries">
                    <span class="mode-icon">🌍</span>
                    <span class="mode-name">Countries of the World</span>
                    <span class="mode-desc">Quiz on countries, flags, and capitals</span>
                </button>
                <button class="mode-btn" data-mode="states">
                    <span class="mode-icon">🗺️</span>
                    <span class="mode-name">States</span>
                    <span class="mode-desc">Quiz on US and Indian states</span>
                </button>
                <button class="mode-btn" data-mode="identify">
                    <span class="mode-icon">🔍</span>
                    <span class="mode-name">Identify Mode</span>
                    <span class="mode-desc">Identify highlighted locations on the map</span>
                </button>
                <button class="mode-btn" data-mode="name-all">
                    <span class="mode-icon">⌨️</span>
                    <span class="mode-name">Name All Countries</span>
                    <span class="mode-desc">Type as many countries as you can!</span>
                </button>
                <button class="mode-btn" data-mode="population-order">
                    <span class="mode-icon">📊</span>
                    <span class="mode-name">Order by Population</span>
                    <span class="mode-desc">Drag countries to order them by population</span>
                </button>
                <button class="mode-btn" data-mode="mystery-flag">
                    <span class="mode-icon">🚩</span>
                    <span class="mode-name">Mystery Flag</span>
                    <span class="mode-desc">See the flag, find the country on the globe</span>
                </button>
                <button class="mode-btn" data-mode="capitals-race">
                    <span class="mode-icon">🏛️</span>
                    <span class="mode-name">Capitals Race</span>
                    <span class="mode-desc">Type the capital of each highlighted country</span>
                </button>
            </div>
        </div>

        <!-- States Sub-Mode Selector -->
        <div class="mode-selector hidden" id="states-selector">
            <h2>Select Region</h2>
            <div class="mode-buttons">
                <button class="mode-btn" data-mode="us-states">
                    <span class="mode-icon">🗽</span>
                    <span class="mode-name">US States</span>
                    <span class="mode-desc">Quiz on the 50 United States</span>
                </button>
                <button class="mode-btn" data-mode="indian-states">
                    <span class="mode-icon">🇮🇳</span>
                    <span class="mode-name">Indian States</span>
                    <span class="mode-desc">Quiz on states and union territories of India</span>
                </button>
                <button class="mode-btn" data-mode="german-states">
                    <span class="mode-icon">🇩🇪</span>
                    <span class="mode-name">German States</span>
                    <span class="mode-desc">Quiz on the 16 Bundesländer of Germany</span>
                </button>
            </div>
            <button id="back-to-modes-btn" class="btn secondary" style="margin-top: 20px;">Back</button>
        </div>

        <div class="game-info hidden" id="game-info">
            <div class="score-board">
                <div class="score-item">
                    <span class="label">Score:</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="label">Question:</span>
                    <span class="value"><span id="current-question">1</span>/<span id="total-questions">10</span></span>
                </div>
            </div>
        </div>

        <div class="question-container hidden" id="question-container">
            <div class="question">
                <h2 id="question-text">Find: <span id="country-name">Loading...</span></h2>
            </div>
            <div class="flag-display" id="flag-display" style="display: none;">
                <img id="flag-image" src="" alt="Country Flag" />
            </div>
            <div class="feedback" id="feedback"></div>
        </div>

        <!-- Standard Map/Globe Container (for non-world-quiz modes) -->
        <div class="map-container hidden" id="map-container">
            <svg id="globe"></svg>
        </div>

        <div class="multiple-choice-container hidden" id="multiple-choice-container">
            <div class="options-grid" id="options-grid"></div>
        </div>

        <!-- World Quiz Question Bar (placed below game-info for compact layout) -->
        <div class="world-quiz-question-bar hidden" id="world-quiz-question-bar">
            <h2 id="world-quiz-current-question"></h2>
        </div>

        <!-- World Quiz Mode Layout: Globe + Side Panels -->
        <div class="world-quiz-layout hidden" id="world-quiz-layout">
            <div class="world-quiz-globe">
                <svg id="globe-world"></svg>
            </div>
            <div class="world-quiz-panels">
                <div class="world-quiz-panel-top" id="world-quiz-panel-top">
                    <div class="question">
                        <h2 id="flag-question-text"></h2>
                    </div>
                    <div class="flag-display" id="flag-display-side" style="display: none;">
                        <img id="flag-image-side" src="" alt="Country Flag" />
                    </div>
                    <div class="multiple-choice-container" id="flag-choice-container" style="display: none;">
                        <div class="options-grid" id="flag-options-grid"></div>
                    </div>
                    <div class="feedback" id="flag-feedback"></div>
                </div>
                <div class="world-quiz-panel-bottom" id="world-quiz-panel-bottom">
                    <div class="question">
                        <h2 id="capital-question-text"></h2>
                    </div>
                    <div class="multiple-choice-container" id="capital-choice-container" style="display: none;">
                        <div class="options-grid" id="capital-options-grid"></div>
                    </div>
                    <div class="feedback" id="capital-feedback"></div>
                </div>
            </div>
        </div>

        <div class="controls hidden" id="controls">
            <button id="next-btn" class="btn" disabled>Next Question</button>
            <button id="give-up-btn" class="btn secondary">Give Up</button>
            <button id="restart-btn" class="btn secondary">Restart Game</button>
            <button id="gamma-lock-toggle" class="btn secondary globe-only" title="Toggle globe tilt lock">Tilt: Locked</button>
        </div>

        <!-- Instructions removed -->
    </div>

    <script src="game.js"></script>
</body>
</html>
